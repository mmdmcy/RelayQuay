# Copy this into your private Plugroot local config and adjust locally.
# Do not put real domains, paths, or tunnel tokens in this public checkout.
#
# For Plugroot-hosted installs, set:
#   RELAYQUAY_ENV_FILE=<private-state-root>/relayquay/relayquay.env
# and copy .env.example there with host-specific values, including:
#   RELAYQUAY_STATE_DIR=<private-state-root>/relayquay
#   RUSTDESK_DATA_DIR=<private-state-root>/rustdesk/data

[[service]]
id = "relayquay"
name = "RelayQuay RustDesk Web Gateway"
plane = "public-authenticated"
category = "remote-access"
kind = "compose"
path = "<plugroot-service-root>/relayquay"
env_file = "<private-state-root>/relayquay/relayquay.env"
url = "https://rustdesk-wss.example.com/healthz"
access = "Cloudflare Access allowlist"
description = "Access-protected WSS gateway for RustDesk Web."
containers = ["relayquay-caddy-1", "relayquay-cloudflared-1"]
controls = ["start", "stop", "restart", "logs"]
ports = [
  "8788/tcp loopback Caddy gateway",
  "21118/tcp private hbbs WebSocket upstream",
  "21119/tcp private hbbr WebSocket upstream",
]
optional = true
